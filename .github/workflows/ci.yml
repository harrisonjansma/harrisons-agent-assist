name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from package.json "packageManager" (pnpm@10.33.0).
      # Don't also pin it here — action-setup errors on a double-specified version.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (shared → apps)
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r --if-present typecheck

      - name: Test
        run: pnpm -r --if-present test
